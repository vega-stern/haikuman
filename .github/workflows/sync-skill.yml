name: Sync SKILL.md and rules

on:
  push:
    branches: [main]
    paths:
      - skills/haikuman/SKILL.md
      - rules/haikuman-activate.md
      - caveman-compress/SKILL.md
      - caveman-compress/scripts/**

concurrency:
  group: sync-skill
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Pull latest before making changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin main

      - name: Sync SKILL.md copies
        run: |
          cp skills/haikuman/SKILL.md haikuman/SKILL.md
          cp skills/haikuman/SKILL.md plugins/haikuman/skills/haikuman/SKILL.md
          cp skills/haikuman/SKILL.md .cursor/skills/haikuman/SKILL.md
          mkdir -p .windsurf/skills/haikuman
          cp skills/haikuman/SKILL.md .windsurf/skills/haikuman/SKILL.md

      - name: Sync compress skill to plugin
        run: |
          # Copy SKILL.md and patch name + process instructions for plugin context
          cp caveman-compress/SKILL.md plugins/haikuman/skills/compress/SKILL.md
          sed -i 's/^name: caveman-compress$/name: compress/' plugins/haikuman/skills/compress/SKILL.md
          sed -i "s|The compression scripts live in \`caveman-compress/scripts/\` (adjacent to this SKILL.md). If the path is not immediately available, search for \`caveman-compress/scripts/__main__.py\`.|This SKILL.md lives alongside \`scripts/\` in the same directory. Find that directory.|" plugins/haikuman/skills/compress/SKILL.md
          sed -i 's|cd caveman-compress && python3|cd <directory_containing_this_SKILL.md> \&\& python3|' plugins/haikuman/skills/compress/SKILL.md
          # Copy scripts verbatim
          rm -rf plugins/haikuman/skills/compress/scripts
          cp -r caveman-compress/scripts plugins/haikuman/skills/compress/scripts
          rm -rf plugins/haikuman/skills/compress/scripts/__pycache__

      - name: Rebuild haikuman.skill ZIP
        run: cd skills && zip -r ../haikuman.skill haikuman/

      - name: Sync auto-activation rules
        run: |
          BODY="rules/haikuman-activate.md"

          # Cline + Copilot — no frontmatter, direct copy
          mkdir -p .clinerules .github
          cp "$BODY" .clinerules/haikuman.md
          cp "$BODY" .github/copilot-instructions.md

          # Cursor — needs alwaysApply frontmatter
          mkdir -p .cursor/rules
          printf '%s\n' '---' 'description: "Haikuman mode — answers in haiku, keeps technical accuracy"' 'alwaysApply: true' '---' '' > .cursor/rules/haikuman.mdc
          cat "$BODY" >> .cursor/rules/haikuman.mdc

          # Windsurf — needs always_on frontmatter
          mkdir -p .windsurf/rules
          printf '%s\n' '---' 'trigger: always_on' '---' '' > .windsurf/rules/haikuman.md
          cat "$BODY" >> .windsurf/rules/haikuman.md

      - name: Commit and push if changed
        run: |
          git add \
            haikuman/SKILL.md \
            plugins/haikuman/skills/compress/ \
            plugins/haikuman/skills/haikuman/SKILL.md \
            .cursor/skills/haikuman/SKILL.md \
            .windsurf/skills/haikuman/SKILL.md \
            haikuman.skill \
            .clinerules/haikuman.md \
            .github/copilot-instructions.md \
            .cursor/rules/haikuman.mdc \
            .windsurf/rules/haikuman.md
          git diff --staged --quiet && exit 0
          git commit -m "chore: sync SKILL.md copies and auto-activation rules [skip ci]"
          git push
